<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenant Admin Panel</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 40px; text-align: center; }
        button { background: #ac5891; color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        button:hover { background: #c26fa7; }
        input { padding: 10px; width: 300px; background: #333; border: 1px solid #555; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>Revenant Ink Control Panel</h1>
    <p>Toggle the holiday special banner live on GitHub Pages</p>

    <div>
        <input type="password" id="github-token" placeholder="Paste GitHub Personal Access Token Here"><br>
    </div>

    <button id="toggle-btn" onclick="togglePromotion(true)">🚀 Go Live (40% OFF)</button>
    <button id="off-btn" onclick="togglePromotion(false)" style="background: #444;">📴 Turn Off Banner</button>

    <p id="status-text" style="margin-top: 20px; color: #aaa;"></p>

    <script>
        // Replace these coordinates with your actual GitHub project details
        const OWNER = "PricklyPear-who-codes"; 
        const REPO = "testing-no-server-push";
        const FILE_PATH = "index.html"; // The file containing your SPECIAL_PROMOTION configuration

        async function togglePromotion(turnOn) {
            const token = document.getElementById('github-token').value;
            const status = document.getElementById('status-text');

            if (!token) {
                status.innerText = "❌ Please enter your GitHub Personal Access Token first.";
                return;
            }

            status.innerText = "Connecting to GitHub...";

            try {
                // Step 1: Fetch the existing file content and its unique SHA fingerprint
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`;
                const getResponse = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });

                if (!getResponse.ok) throw new Error("Could not fetch file from GitHub. Check your repository name or token.");
                
                const fileData = await getResponse.json();
                const currentSHA = fileData.sha;
                
                // Decode the base64 code string sent by GitHub into readable text
                let fileContent = atob(fileData.content);

                // Step 2: Swap the boolean switch inside the text using a regular expression match
                if (turnOn) {
                    fileContent = fileContent.replace(/isLive:\s*(true|false)/, "isLive: true");
                } else {
                    fileContent = fileContent.replace(/isLive:\s*(true|false)/, "isLive: false");
                }

                // Step 3: Package the modified content back into base64 format
                const updatedContentBase64 = btoa(unescape(encodeURIComponent(fileContent)));

                // Step 4: Send a PUT request to update and push the commit directly to the repository
                status.innerText = "Pushing commit directly to repository...";
                const putResponse = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: turnOn ? "Build: Activate Promo Banner" : "Build: Deactivate Promo Banner",
                        content: updatedContentBase64,
                        sha: currentSHA
                    })
                });

                if (putResponse.ok) {
                    status.innerHTML = `🟢 <strong>Success!</strong> GitHub is rebuilding your site right now. Will go live on mobile phones in ~60 seconds.`;
                } else {
                    const errorDetails = await putResponse.json();
                    status.innerText = `❌ Push Failed: ${errorDetails.message}`;
                }

            } catch (err) {
                status.innerText = `❌ Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
